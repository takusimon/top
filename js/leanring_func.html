<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <script>
    let add7 = (number) => number + 7; 
    let multiply = (a,b) => a *b;
    console.log (add7(21));
    console.log (multiply(5,17));

    function capitalize (word) {
        let chars = word.split("");
        chars[0] = chars[0].toUpperCase();
        for (let i = 1; i < chars.length; i++){
            chars[i]= chars[i].toLowerCase();
        }
        return chars.join("");
    }
    console.log(capitalize("BigGer"));

    let lastLetter = (word) => word.charAt(word.length-1);
    console.log(lastLetter("Takudzwa"));

    let answer = parseInt(prompt("Please enter a number you would like to Fizzbuzz up to: "));

    for (let i = 1; i <= answer; i++) {
        if (i % 3 === 0 && i % 5 == 0) {
            console.log("FizzBuzz");
        }
          else if (i % 3 === 0) {
            console.log("Fizz");
        } else if (i % 5 === 0) {
            console.log("Buzz");
        }
         else {
            console.log(i);
        }
    }
    
    </script>
</body>
</html>
